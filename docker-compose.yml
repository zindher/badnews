version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: badnews-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__ConnectionString=Server=mecapro-prod.database.windows.net;Initial Catalog=BadNews;User ID=Mecapro2025;Password=${DB_PASSWORD};Persist Security Info=False;Encrypt=True;TrustServerCertificate=False;MultipleActiveResultSets=False;Command Timeout=30
      - Twilio__AccountSid=${TWILIO_ACCOUNT_SID}
      - Twilio__AuthToken=${TWILIO_AUTH_TOKEN}
      - Twilio__PhoneNumber=${TWILIO_PHONE_NUMBER}
      - MercadoPago__AccessToken=${MERCADO_PAGO_ACCESS_TOKEN}
      - SendGrid__ApiKey=${SENDGRID_API_KEY}
      - Jwt__Secret=${JWT_SECRET}
    networks:
      - badnews-network

  # Frontend (opcional - normalmente se ejecuta con npm)
  frontend:
    image: node:18-alpine
    container_name: badnews-frontend
    ports:
      - "5173:5173"
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - badnews-network

networks:
  badnews-network:
    driver: bridge
